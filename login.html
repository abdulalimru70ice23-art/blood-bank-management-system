<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LifeShare - Login</title>

<link rel="stylesheet" href="login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- ============================= -->
<!-- BACK TO HOME BUTTON -->
<!-- Public Home Page -->
<!-- ============================= -->

<a href="Home.html" class="back-home">← Back to Home</a>


<div class="container">

<div class="login-card">

<div class="logo">🩸</div>

<h1 class="brand">LifeShare</h1>

<h2 class="title">Blood Bank Management System</h2>

<p class="subtitle">Be the reason someone lives today</p>


<!-- ============================= -->
<!-- LOGIN FORM -->
<!-- ============================= -->

<form id="loginForm">

<div class="input-group">
<input type="text" id="phone" placeholder="Phone Number" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<div class="options">
<a href="forgot-password.html">Forgot Password?</a>
</div>

<button type="submit" class="login-btn">Login</button>

</form>


<!-- ============================= -->
<!-- REGISTER LINK -->
<!-- ============================= -->

<div class="register">

<p>Don't have an account?</p>
<a href="register.html">Create Account</a>

</div>

</div>

</div>



<!-- ============================= -->
<!-- LOGIN SCRIPT -->
<!-- Send login data to backend -->
<!-- ============================= -->

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

// ===============================
// Collect Login Data
// ===============================

const loginData = {

phone: document.getElementById("phone").value,
password: document.getElementById("password").value

};

try{

// ===============================
// Send login request
// ===============================

const res = await fetch("http://127.0.0.1:5000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(loginData)

});

const data = await res.text();

alert(data);

// ===============================
// LOGIN SUCCESS
// ===============================

if(data === "Login Successful"){

localStorage.setItem("userLoggedIn","true");
localStorage.setItem("phone", loginData.phone);

window.location.href = "index.html";

}

}catch(err){

console.log("Login error:", err);
alert("Server error. Please try again.");

}

});

</script>


</body>
</html>
