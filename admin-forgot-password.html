<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Password Recovery - LifeShare</title>

<link rel="stylesheet" href="admin-forgot-password.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<a href="admin-login.html" class="back-home">← Back to Admin Login</a>

<div class="container">

<div class="reset-card">

<div class="logo">🩸</div>

<h2>Admin Password Recovery</h2>

<p class="subtitle">Verify your identity to reset password</p>

<form>

<input type="email" placeholder="Admin Email / ID" required>

<select required>
<option>Security Question</option>
<option>What is your hospital ID?</option>
<option>What is your admin code?</option>
<option>What is your secret key?</option>
</select>

<input type="text" placeholder="Answer" required>

<input type="text" placeholder="Verification Code" required>

<input type="password" placeholder="New Password" required>

<input type="password" placeholder="Confirm Password" required>

<button type="submit">Reset Password</button>

</form>

<p class="warning">⚠ Unauthorized password reset attempts are monitored</p>

</div>

</div>
<script src="script.js"></script>
</body>

</html>
