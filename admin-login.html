<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - LifeShare</title>

<link rel="stylesheet" href="admin-login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- Back to Home -->

<a href="index.html" class="back-home">← Back to Home</a>


<div class="login-wrapper">

<div class="admin-card">

<div class="logo">🩸</div>

<h1 class="brand">LifeShare</h1>

<h2 class="title">Admin Panel</h2>

<p class="subtitle">Authorized personnel only</p>


<!-- LOGIN FORM -->

<form id="adminLoginForm" onsubmit="return adminLogin()" autocomplete="off">

<div class="input-group">

<input 
type="text" 
id="adminUser" 
placeholder="Admin Email / ID"
required>

</div>


<div class="input-group">

<input 
type="password" 
id="adminPass" 
placeholder="Admin Password"
required>

</div>


<div class="input-group">

<input 
type="text" 
id="adminCode" 
placeholder="Security Code"
required>

</div>


<div class="options">

<a href="admin-forgot-password.html">Forgot Password?</a>

</div>


<button class="login-btn" type="submit">

Login as Admin

</button>

</form>


<p class="warning">

⚠ Unauthorized access is prohibited

</p>

</div>

</div>


<script>

function adminLogin(){

let username = document.getElementById("adminUser").value.trim();
let password = document.getElementById("adminPass").value.trim();
let code = document.getElementById("adminCode").value.trim();

if(username === "" || password === "" || code === ""){

alert("Please fill all fields!");
return false;

}

if(username === "admin" && password === "12345" && code === "RU123"){

localStorage.setItem("adminLoggedIn","true");

window.location.href = "admin-dashboard.html";

return false;

}

else{

alert("Invalid admin credentials!");
return false;

}

}

</script>

</body>
</html>
