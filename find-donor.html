<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Find Blood Donor - LifeShare</title>

<link rel="stylesheet" href="find-donor.css">

</head>

<body>



<nav class="navbar">

<div class="logo">
<span>🩸</span> LifeShare
</div>

<div class="nav-left">

<ul class="menu">

<li><a href="index.html">Home</a></li>
<li><a href="find-donor.html" class="active">Find Donor</a></li>
<li><a href="donate.html">Donate Blood</a></li>

</ul>

</div>

<div class="nav-right">

👤
</a>

</div>

</nav>


<main>

<section class="search-section">

<h1>Find Blood Donors</h1>
<p>Search donors by blood group or location</p>

<div class="search-box">

<select id="bloodFilter" onchange="filterDonors()">

<option value="all">All Blood Groups</option>
<option value="A+">A+</option>
<option value="A-">A-</option>
<option value="B+">B+</option>
<option value="B-">B-</option>
<option value="AB+">AB+</option>
<option value="AB-">AB-</option>
<option value="O+">O+</option>
<option value="O-">O-</option>

</select>

<input type="text" id="locationInput" placeholder="Search location..." onkeyup="filterDonors()">

</div>

</section>


<section class="donor-list" id="donorList">

<!-- Donors will load here -->

</section>

</main>


<footer>

<p>© 2026 LifeShare Blood Bank Management System</p>

</footer>


<script>

let allDonors = [];


// ======================
// LOAD DONORS FROM DB
// ======================

async function loadDonors(){

const res = await fetch("http://127.0.0.1:5000/donors");

allDonors = await res.json();

displayDonors(allDonors);

}


// ======================
// DISPLAY DONORS
// ======================

function displayDonors(donors){

const list = document.getElementById("donorList");

list.innerHTML = "";

donors.forEach(donor => {

const card = document.createElement("div");

card.className = "donor-card";

card.innerHTML = `
<h3>${donor.name}</h3>
<p>Blood Group: ${donor.blood}</p>
<p class="location">Location: ${donor.location}</p>
<a href="request-blood.html?blood=${donor.blood}&location=${donor.location}" class="contact-btn">
🩸 Request Blood
</a>`;

list.appendChild(card);

});

}


// ======================
// FILTER DONORS
// ======================

function filterDonors(){

let blood = document.getElementById("bloodFilter").value.toLowerCase();
let location = document.getElementById("locationInput").value.toLowerCase();

let filtered = allDonors.filter(donor => {

let bloodMatch = blood === "all" || donor.blood.toLowerCase() === blood;
let locationMatch = donor.location.toLowerCase().includes(location);

return bloodMatch && locationMatch;

});

displayDonors(filtered);

}


// ======================
// LOAD WHEN PAGE OPEN
// ======================

loadDonors();

</script>

</body>
</html>
