<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Profile - LifeShare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* ===== Background ===== */

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:url("https://images.unsplash.com/photo-1581594693702-fbdc51b2763b?q=80&w=1974") no-repeat center center/cover;

}

/* ===== Glass Card ===== */

.card{

width:420px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);

border-radius:20px;

padding:35px;

box-shadow:0 8px 40px rgba(0,0,0,0.2);

color:#fff;

}

/* ===== Title ===== */

.card h2{

text-align:center;
margin-bottom:25px;

}

/* ===== Inputs ===== */

label{

font-size:14px;
margin-top:10px;
display:block;

}

input,select{

width:100%;

padding:10px;

margin-top:5px;
margin-bottom:12px;

border:none;
border-radius:8px;

outline:none;

}

/* ===== Button ===== */

button{

width:100%;
padding:12px;

border:none;

border-radius:30px;

background:#ff4d4d;

color:white;

font-weight:600;

cursor:pointer;

margin-top:10px;

transition:0.3s;

}

button:hover{

background:#e63c3c;

}

/* Back */

.back{

position:absolute;
top:30px;
left:30px;

background:#ffffffaa;

padding:8px 16px;

border-radius:20px;

text-decoration:none;
color:#333;

font-weight:500;

}

</style>

</head>

<body>

<a href="user-profile.html" class="back">← Back</a>

<div class="card">

<h2>Edit Profile</h2>

<form id="editForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Blood Group</label>

<select id="bloodGroup">

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

<label>Location</label>

<select id="location">

<option>Dhaka</option>
<option>Rajshahi</option>
<option>Chittagong</option>
<option>Khulna</option>
<option>Sylhet</option>

</select>

<label>New Password</label>
<input type="password" id="password" placeholder="Leave blank if no change">

<button type="submit">Update Profile</button>

</form>

</div>

<script>

/* ===============================
LOAD CURRENT USER DATA
=============================== */

async function loadUser(){

try{

const phone = localStorage.getItem("phone")

const res = await fetch("http://127.0.0.1:5000/user-profile")

const user = await res.json()

document.getElementById("name").value = user.name || ""
document.getElementById("bloodGroup").value = user.bloodGroup || ""
document.getElementById("location").value = user.location || ""

}catch(err){

console.log(err)
alert("Failed to load user data")

}

}

loadUser()


/* ===============================
UPDATE PROFILE
=============================== */

document.getElementById("editForm").addEventListener("submit", async function(e){

e.preventDefault()

const phone = localStorage.getItem("phone")

const data = {

name: document.getElementById("name").value,
bloodGroup: document.getElementById("bloodGroup").value,
location: document.getElementById("location").value,
phone: phone

}


/* PASSWORD CHANGE (OPTIONAL) */

const newPassword = document.getElementById("password").value

if(newPassword !== ""){

data.password = newPassword

}


try{

const res = await fetch("http://127.0.0.1:5000/update-profile",{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(data)

})

const msg = await res.text()

alert(msg)

/* BACK TO PROFILE PAGE */

window.location.href = "user-profile.html"

}catch(err){

console.log(err)
alert("Profile update failed")

}

})

</script>

</body>
</html>
