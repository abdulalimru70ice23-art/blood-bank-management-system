<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account - LifeShare</title>

<link rel="stylesheet" href="register.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<a href="index.html" class="back-btn">← Back to Home</a>

<h1 class="page-title">Create your account</h1>

<div class="register-container">

<form class="register-form" id="signupForm">

<div class="form-left">

<label>Enter your name</label>
<input type="text" id="name" placeholder="Name" required>

<label>Enter your phone number</label>
<input type="text" id="phone" placeholder="Phone number" required>

<label>Select your blood group</label>
<select id="blood" required>
<option value="">Select blood group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>Select your location</label>
<select id="location" required>
<option value="">Select location</option>
<option>Dhaka</option>
<option>Rajshahi</option>
<option>Chittagong</option>
<option>Khulna</option>
<option>Sylhet</option>
</select>

</div>

<div class="form-right">

<label>Create password</label>
<input type="password" id="password" placeholder="Password" required>

<label>Confirm password</label>
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<div class="nid-section">

<h3>Upload your NID</h3>

<div class="upload-box">

<div class="upload">
<label>Front side</label>
<input type="file" id="nidFront">
</div>

<div class="upload">
<label>Back side</label>
<input type="file" id="nidBack">
</div>

</div>

</div>

</div>

<div class="submit-area">
<button type="submit">Create Account</button>
</div>

</form>

<div class="login-option">

<p>Already have an account?</p>
<a href="login.html">Sign in</a>

</div>

</div>

<script>

document.getElementById("signupForm").addEventListener("submit", async function(e){

e.preventDefault();

const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;

if(password !== confirmPassword){
alert("Passwords do not match");
return;
}

const user = {

name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
blood: document.getElementById("blood").value,
location: document.getElementById("location").value,
password: password

};

const res = await fetch("http://127.0.0.1:5000/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(user)

});

const data = await res.text();

alert(data);

document.getElementById("signupForm").reset();

});

</script>


</body>
</html>
