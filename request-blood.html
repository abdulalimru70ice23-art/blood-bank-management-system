</head>

<body>

<nav class="navbar">

<!-- HEADER -->

<section class="header">

<h1>Request Blood</h1>
<p>Fill out the form below to request blood urgently</p>

</section>

<!-- FORM -->

<div class="request-container">

<form class="request-form" id="requestForm">

<div class="form-left">

<label>Patient Name</label>
<input type="text" id="name" placeholder="Enter patient name" required>

<label>Contact Number</label>
<input type="text" id="phone" placeholder="Phone number" required>

<label>Blood Group Needed</label>

<select id="bloodGroup" required>
<option value="">Select blood group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>Hospital / Location</label>
<input type="text" id="location" placeholder="Enter hospital or location" required>

<label>Units Needed</label>
<input type="number" id="units" placeholder="Example: 2 bags">

</div>

<div class="form-right">

<label>Reason / Medical Condition</label>
<textarea id="reason" placeholder="Explain why blood is needed..." rows="6"></textarea>

<label>Upload Medical Document</label>

<div class="upload-box">
<input type="file">
</div>

<label>Urgency Level</label>

<select id="urgency">
<option>Normal</option>
<option>Urgent</option>
<option>Emergency</option>
</select>

</div>

<div class="submit-area">

<button type="submit">Send Blood Request</button>

</div>

</form>

</div>

<!-- FOOTER -->

<footer>

<p>© 2026 LifeShare Blood Bank Management System</p>

</footer>

<script>

document.getElementById("requestForm").addEventListener("submit", async function(e){

e.preventDefault();

const request = {

patient: document.getElementById("name").value,
phone: document.getElementById("phone").value,
blood: document.getElementById("bloodGroup").value,
location: document.getElementById("location").value,
units: document.getElementById("units").value,
reason: document.getElementById("reason").value,
urgency: document.getElementById("urgency").value

};

const res = await fetch("http://127.0.0.1:5000/add-request",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(request)

});

const data = await res.text();

alert(data);

document.getElementById("requestForm").reset();

});

</script>

</body>
</html>
